name: EAS Android Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'services/**'
      - 'store/**'
      - 'constants/**'
      - 'assets/**'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Android Build (${{ github.event.inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Write Firebase config files from secrets (never committed to git)
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Write GoogleService-Info.plist
        run: echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > GoogleService-Info.plist

      - name: Build on EAS
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
